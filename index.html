<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maahi ECM</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="design.css">
</head>
<body>

<nav>
  <div class="logo"><img src="logo.jpeg" alt="Logo" id="logoImg"></div>
  <div class="nav-right">
    <div class="cart" onclick="openCart()">🛒 <span id="count">0</span></div>
    <button id="loginBtn" class="normal" onclick="openLogin()">Login</button>
    <button id="logoutBtn" class="normal hidden" onclick="logout()" >Logout</button>
  </div>
</nav>

<section class="hero">
  <h1>Premium Gadgets</h1>
  <input type="text" id="search" placeholder="Search phones or brands...">
  <div class="filters">
    <button onclick="filterCat('all')" class="normal">All</button>
    <button onclick="filterCat('mobile')" class="normal">Mobiles</button>
    <button onclick="filterCat('laptop')" class="normal">Laptops</button>
    <button onclick="filterCat('gaming')" class="normal">Gaming</button>
    <button onclick="filterCat('clothes')" class="normal">Clothes</button>
  </div>
</section>

<div class="grid" id="products"></div>

<div class="modal" id="productModal">
  <div class="modal-content" style="max-width: 500px;">
    <div id="productDetailContent"></div>
    <button class="yellow-btn" style="background:#eee; color:#333; margin-top: 10px;" onclick="closeProductModal()">Close</button>
  </div>
</div>

<div class="modal" id="cartModal">
  <div class="modal-content">
    <h3>Your Cart</h3>
    <div id="cartItems"></div>
    <hr>
    <h4>Total: ₹<span id="total">0</span></h4>
    <button class="yellow-btn" onclick="pay()">Checkout</button>
    <button style="background:#eee; color:#333;" class="yellow-btn" onclick="closeCart()">Close</button>
  </div>
</div>

<div class="modal" id="loginModal">
  <div class="modal-content">
    <h3 id="authTitle">Login</h3>
    <input id="username" placeholder="Username" style="width:100%; padding:10px; margin:10px 0;">
    <input id="password" type="password" placeholder="Password" style="width:100%; padding:10px; margin:10px 0;">
    <button class="yellow-btn" onclick="handleAuth()">Submit</button>
    <p onclick="toggleAuth()" style="cursor:pointer; color:var(--primary); margin-top:10px;">Switch Login/Signup</p>
  </div>
</div>

<div class="modal" id="paymentModal">
  <div class="payment-content" style="max-width: 500px;">
    
    <div id="paymentStep1">
        <h3>Shipping Address</h3>
        <div class="address-form" style="margin-top:15px;">
            <input type="text" id="fullName" placeholder="Full Name" style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="text" id="phone" placeholder="Phone Number" style="width:100%; padding:10px; margin-bottom:10px;">
            <textarea id="address" placeholder="Full Address" style="width:100%; padding:10px; margin-bottom:10px; height:60px;"></textarea>
            <div style="display:flex; gap:10px;">
                <input type="text" id="city" placeholder="City" style="flex:1; padding:10px;">
                <input type="text" id="pincode" placeholder="Pincode" style="flex:1; padding:10px;">
            </div>
        </div>
        <button class="yellow-btn" onclick="startPaymentAnimation()" style="margin-top:20px;">Proceed to Payment</button>
    </div>

    <div id="paymentAnimScreen" class="hidden" style="text-align:center; padding: 40px 0;">
        <div class="rupee-anim">₹</div>
        <p style="margin-top:20px; font-weight:bold; color:var(--text-muted)">Processing your payment...</p>
    </div>

    <div id="orderSummaryScreen" class="hidden">
        <h3>Order Summary</h3>
        <div id="summaryDetails" style="text-align:left; font-size:0.9rem; margin-top:15px; border-bottom:1px solid #eee; padding-bottom:10px;">
            </div>
        <div id="summaryPricing" style="margin-top:10px; text-align:left;">
            </div>
        <div style="display:flex; gap:10px;">
            <button class="normal" style="flex:1; background:#eee; color:#333;" onclick="closePaymentModal()">Cancel Order</button>
            <button class="yellow-btn" style="flex:1; margin-top:0;" onclick="showQRCode()">Place Order</button>
        </div>
    </div>

    <div id="paymentStep2" class="hidden" style="text-align:center;">
        <h3>Scan to Pay</h3>
        <div id="qrContainer" style="margin:20px 0;"></div>
        <button class="cyan-btn" onclick="simulateScan()">I Have Paid</button>
    </div>

    <div id="paymentStep3" class="hidden" style="text-align:center;">
        <div class="success-icon">✔</div>
        <h3>Order Placed Successfully!</h3>
        <p>Order ID: <span id="txnId"></span></p>
        <button class="yellow-btn" onclick="closePaymentAndClearCart()">Done</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-K9GS37LP11"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
  
    gtag('config', 'G-K9GS37LP11');
  </script>
</body>
</html>
